# Discord settings:

bot_token: 
client_id: 
status_message: 

allow_dms: true
allowed_channel_ids: []
allowed_role_ids: []
blocked_user_ids: []

max_text: 100000
max_images: 5
max_messages: 25

use_plain_responses: false

# LLM settings:

providers:
  openai:
    base_url: https://api.openai.com/v1
    api_keys:
      - your-openai-api-key-1
      - your-openai-api-key-2
      # Add more keys as needed
  x-ai:
    base_url: https://api.x.ai/v1
    api_keys:
      - your-xai-api-key-1
      - your-xai-api-key-2
      # Add more keys as needed
  mistral:
    base_url: https://api.mistral.ai/v1
    api_keys: []
  groq:
    base_url: https://api.groq.com/openai/v1
    api_keys: []
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_keys: []
  ollama:
    base_url: http://localhost:11434/v1
  lmstudio:
    base_url: http://localhost:1234/v1
  vllm:
    base_url: http://localhost:8000/v1
  oobabooga:
    base_url: http://localhost:5000/v1
  jan:
    base_url: http://localhost:1337/v1

model: openai/gpt-4o

extra_api_parameters:
  max_tokens: 4096
  temperature: 1.0
  top_p: 1.0

rephraser_model: openai/gpt-4o-mini

rephraser_extra_api_parameters:
  max_tokens: 4096
  temperature: 0.7
  top_p: 1.0

query_splitter_model: openai/gpt-4o-mini

query_splitter_extra_api_parameters:
  max_tokens: 4096
  temperature: 0.5
  top_p: 1.0

# Serper API settings:
serper_api_keys:
  - your-serper-api-key-1
  - your-serper-api-key-2
  # Add more keys as needed

# SerpApi settings:
serpapi_api_keys:
  - your-serpapi-api-key-1
  - your-serpapi-api-key-2
  # Add more keys as needed

# YouTube API settings:
youtube_api_keys:
  - your-youtube-api-key-1
  - your-youtube-api-key-2
  # Add more keys as needed

# Maximum number of URLs to fetch and process in search queries
max_urls: 5